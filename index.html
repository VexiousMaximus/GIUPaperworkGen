<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SanGang Entry Generator PROTOTYPE V1a</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

h1 {
    text-align: center;
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 5px;
}

button:hover {
    background: #0ea5e9;
}

.output {
    margin-top: 30px;
}

.box {
    background: white;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
}

.header-black {
    background: black;
    color: white;
    text-align: center;
    font-weight: bold;
    padding: 5px;
}

.confidential {
    text-align: center;
    font-weight: bold;
    margin-bottom: 10px;
}

.confidential span {
    color: red;
}
</style>
</head>
<body>

<div class="container">

<h1>SanGang Entry Generator</h1>

<input id="investigator" placeholder="Investigator Name">
<input id="badge" placeholder="Badge Number">
<input type="datetime-local" id="datetime">
<input id="location" placeholder="Location">

<input id="subject" placeholder="Subject Name">
<input id="alias" placeholder="Alias">
<input id="gang" placeholder="Gang Affiliation">

<select id="threat">
<option>LOW</option>
<option>MEDIUM</option>
<option>HIGH</option>
</select>

<textarea id="description" placeholder="Description"></textarea>
<textarea id="criteria" placeholder="Criteria (one per line, A-H)"></textarea>
<textarea id="evidence" placeholder="Evidence (format: Name|Link per line)"></textarea>

<button onclick="generate()">Generate Document</button>
<button onclick="copyHTML()">Copy Document to MDC</button>

<div id="output" class="output"></div>

</div>

<script>
function generate() {
    const investigator = document.getElementById('investigator').value;
    const badge = document.getElementById('badge').value;
    const datetime = document.getElementById('datetime').value;
    const location = document.getElementById('location').value;

    const subject = document.getElementById('subject').value;
    const alias = document.getElementById('alias').value;
    const gang = document.getElementById('gang').value;
    const threat = document.getElementById('threat').value;
    const description = document.getElementById('description').value;

    const criteriaLines = document.getElementById('criteria').value.split("\n");
    const evidenceLines = document.getElementById('evidence').value.split("\n");

    let criteriaHTML = "";
    criteriaLines.forEach((line, i) => {
        if(line.trim() !== "") {
            const letter = String.fromCharCode(65 + i); // A, B, C...
            criteriaHTML += `<b>CRITERIA ${letter}:</b> <span style="color:black;">${line}</span><br>`;
        }
    });

    let evidenceHTML = "";
    evidenceLines.forEach((line, i) => {
        if(line.includes("|")) {
            const [name, link] = line.split("|");
            evidenceHTML += `<b>Exhibit ${i+1}:</b> <span style="color:black;">${name} - <a href="${link}" target="_blank">${link}</a></span><br>`;
        }
    });

    const html = `
    <div style="text-align:center; margin-bottom:10px;">
        <img src="https://mdc.gta.world/img/logo/en_ls/DAO.png" style="max-width:120px;">
    </div>

    <div style="text-align:center; font-weight:bold; margin-bottom:10px;">
        <span style="color:red;">CONFIDENTIAL</span> - INTERNAL USE ONLY<br>
        Unauthorized access, duplication or distribution is strictly prohibited.
    </div>

    <div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px;">FILING DETAILS</div>
    <div style="background:white; padding:10px; border:1px solid #000; color:black;">
        <b>FILING INVESTIGATOR:</b> <span style="color:black;">${investigator}</span><br>
        <b>BADGE NUMBER:</b> <span style="color:black;">${badge}</span><br>
        <b>FILING AGENCY:</b> <span style="color:black;">BUREAU OF INVESTIGATION</span><br>
        <b>DATE/TIME:</b> <span style="color:black;">${datetime}</span><br>
        <b>LOCATION:</b> <span style="color:black;">${location}</span>
    </div>

    <div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px; margin-top:10px;">SUBJECT DETAILS</div>
    <div style="background:white; padding:10px; border:1px solid #000; color:black;">
        <b>SUBJECT NAME:</b> <span style="color:black;">${subject}</span><br>
        <b>SUBJECT'S ALIAS:</b> <span style="color:black;">${alias}</span><br>
        <b>GANG AFFILIATION:</b> <span style="color:black;">${gang}</span><br>
        <b>THREAT LEVEL:</b> <span style="color:black;">${threat}</span><br>
        <b>DESCRIPTION:</b> <span style="color:black;">${description}</span>
    </div>

    <div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px; margin-top:10px;">CRITERIA</div>
    <div style="background:white; padding:10px; border:1px solid #000; color:black;">
        ${criteriaHTML}
    </div>

    <div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px; margin-top:10px;">EVIDENCE</div>
    <div style="background:white; padding:10px; border:1px solid #000; color:black;">
        ${evidenceHTML}
    </div>
    `;

    document.getElementById('output').innerHTML = html;
}

function copyHTML() {
    const content = document.getElementById('output').innerHTML;

    const fullHTML = `
    <div style="font-family: Arial, sans-serif; background:#0b0f1a; color:white; padding:20px;">
        ${content}
    </div>
    `;

    navigator.clipboard.write([
        new ClipboardItem({
            "text/html": new Blob([fullHTML], { type: "text/html" })
        })
    ]).then(() => {
        alert('Document copied! Paste to MDC!');
    }).catch(err => {
        console.error(err);
        alert('Failed to copy document sadmouse');
    });
}
</script>

</body>
</html>
