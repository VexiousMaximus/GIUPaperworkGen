<script>
function generate() {
    const investigator = document.getElementById('investigator').value;
    const badge = document.getElementById('badge').value;
    const datetime = document.getElementById('datetime').value;
    const location = document.getElementById('location').value;

    const subject = document.getElementById('subject').value;
    const alias = document.getElementById('alias').value;
    const gang = document.getElementById('gang').value;
    const threat = document.getElementById('threat').value;
    const description = document.getElementById('description').value;

    const criteriaLines = document.getElementById('criteria').value.split("\n");
    const evidenceLines = document.getElementById('evidence').value.split("\n");

    let criteriaHTML = "";
    const letters = ['A','B','C','D','E','F','G','H'];
    criteriaLines.forEach((line, i) => {
        if(line.trim() !== "") {
            criteriaHTML += `<font color="#000000"><b>CRITERIA ${letters[i]}:</b> ${line}</font><br>`;
        }
    });

    let evidenceHTML = "";
    evidenceLines.forEach((line, i) => {
        if(line.includes("|")) {
            const [name, link] = line.split("|");
            evidenceHTML += `<font color="#000000"><b>Exhibit ${i+1}:</b> ${name} - <a href="${link}" target="_blank">ATTACHMENT</a></font><br>`;
        }
    });

    const html = `<p><br></p>
<div style="text-align:center; margin-bottom:10px;">
    <img src="https://mdc.gta.world/img/logo/en_ls/DAO.png" style="max-width:120px;">
</div><p><br></p>
<div style="text-align:center; font-weight:bold; margin-bottom:10px;">
    <span style="color:red;">CONFIDENTIAL</span> - INTERNAL USE ONLY<br>
    Unauthorized access, duplication or distribution is strictly prohibited.
</div><p><br></p>
<div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px;">FILING DETAILS</div><p><br></p>
<div style="background:white; padding:10px; border:1px solid #ccc;">
    <font color="#000000"><b>FILING INVESTIGATOR:</b> ${investigator}<br>
    <b>BADGE NUMBER:</b> ${badge}<br>
    <b>FILING AGENCY:</b> BUREAU OF INVESTIGATION<br>
    <b>DATE/TIME:</b> ${datetime}<br>
    <b>LOCATION:</b> ${location}</font>
</div><p><br></p>
<div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px; margin-top:10px;">SUBJECT DETAILS</div><p><br></p>
<div style="background:white; padding:10px; border:1px solid #ccc;">
    <font color="#000000"><b>SUBJECT NAME:</b> ${subject}<br>
    <b>SUBJECT'S ALIAS:</b> ${alias}<br>
    <b>GANG AFFILIATION:</b> ${gang}<br>
    <b>THREAT LEVEL:</b> ${threat}<br>
    <b>DESCRIPTION:</b> ${description}</font>
</div><p><br></p>
<div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px; margin-top:10px;">CRITERIA</div><p><br></p>
<div style="background:white; padding:10px; border:1px solid #ccc;">
    ${criteriaHTML}
</div><p><br></p>
<div style="background:black; color:white; text-align:center; font-weight:bold; padding:5px; margin-top:10px;">EVIDENCE</div><p><br></p>
<div style="background:white; padding:10px; border:1px solid #ccc;">
    ${evidenceHTML}
</div>`;

    document.getElementById('output').innerHTML = html;
}

function copyHTML() {
    const content = document.getElementById('output').innerHTML;
    const textarea = document.createElement('textarea');
    textarea.value = content;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert('Document HTML copied to clipboard in WYSIWYG-friendly format');
}
</script>
